services:
  - type: web
    name: golite-community
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SSID_ENCRYPTION_KEY
        sync: false
      - key: TRC20_WALLET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: POCKET_OPTION_SSID
        sync: false
    healthCheckPath: /api/health
