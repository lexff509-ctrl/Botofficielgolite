services:
  - type: web
    name: botofficielgolite
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: golite-db
          column: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SSID_ENCRYPTION_KEY
        # ⚠️ CRITIQUE: NE PAS utiliser generateValue ici
        # Cette clé doit être FIXE dans Render Dashboard → Environment Variables
        # Une clé aléatoire à chaque déploiement rendrait tous les SSID en DB illisibles
        sync: false
      - key: NEXTAUTH_URL
        value: https://botofficielgolite.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: POCKET_OPTION_SSID
        sync: false

databases:
  - name: golite-db
    plan: free
