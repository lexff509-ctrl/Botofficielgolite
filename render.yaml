services:
  - type: web
    name: golite-elite-bot
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: golite-db
          column: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SSID_ENCRYPTION_KEY
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://golite-elite-bot.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: POCKET_OPTION_SSID
        sync: false
        placeholder: "Optionnel: SSID de l'admin pour le bot partagé"

databases:
  - name: golite-db
    plan: free
