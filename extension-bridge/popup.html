<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .title { font-size: 13px; font-weight: 700; color: #fff; }
    .version { font-size: 10px; color: #475569; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-badge.connected {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: #22c55e;
    }
    .status-badge.disconnected {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #ef4444;
    }
    .status-badge.waiting {
      background: rgba(234,179,8,0.1);
      border: 1px solid rgba(234,179,8,0.25);
      color: #eab308;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 11px;
    }
    .info-row:last-of-type { border-bottom: none; }
    .info-label { color: #64748b; }
    .info-value { color: #e2e8f0; font-weight: 500; text-align: right; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .info-value.green { color: #22c55e; }
    .info-value.red { color: #ef4444; }
    .info-value.yellow { color: #eab308; }

    .apikey-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1e293b;
    }
    .apikey-label { font-size: 10px; color: #64748b; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .apikey-input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      color: #06b6d4;
      font-size: 11px;
      font-family: monospace;
      outline: none;
    }
    .apikey-input:focus { border-color: #06b6d4; }
    .save-btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.85; }
    .save-msg { font-size: 10px; color: #22c55e; text-align: center; margin-top: 4px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <div>
      <div class="title">BotOfficiel Bridge</div>
      <div class="version">v1.1.0</div>
    </div>
  </div>

  <div id="statusBadge" class="status-badge waiting">
    <div id="statusDot" class="dot yellow"></div>
    <span id="statusText">Chargement...</span>
  </div>

  <div id="infoRows"></div>

  <div class="apikey-section">
    <div class="apikey-label">Clé API Extension</div>
    <input id="apiKeyInput" class="apikey-input" type="password" placeholder="Collez votre clé ici..." />
    <button class="save-btn" onclick="saveKey()">Sauvegarder la clé</button>
    <div id="saveMsg" class="save-msg">✅ Clé sauvegardée !</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
